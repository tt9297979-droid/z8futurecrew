<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Baccarat Screen Analyzer</title>

<style>

body{
background:#0b0f1a;
color:white;
font-family:Arial;
text-align:center
}

h1{
margin:20px
}

button{
padding:12px 25px;
font-size:16px;
background:#00c3ff;
border:none;
border-radius:8px;
cursor:pointer
}

.container{
display:flex;
justify-content:center;
gap:30px;
margin-top:30px
}

.panel{
background:#151b2e;
padding:20px;
border-radius:12px
}

table{
border-collapse:collapse
}

td{
width:22px;
height:22px;
border:1px solid #333
}

.red{background:#ff3d3d}
.blue{background:#2979ff}

video{
border-radius:10px;
margin-top:20px
}

</style>

</head>

<body>

<h1>Baccarat AI Screen Analyzer</h1>

<button onclick="startCapture()">Share Screen</button>

<br><br>

<video id="video" width="400" autoplay muted></video>

<div class="container">

<div class="panel">
<h3>Big Road</h3>
<table id="bigroad"></table>
</div>

</div>

<script>

let results=[]

async function startCapture(){

const stream=await navigator.mediaDevices.getDisplayMedia({
video:true
})

const video=document.getElementById("video")
video.srcObject=stream

setInterval(()=>scanFrame(video),2000)

}

function scanFrame(video){

const canvas=document.createElement("canvas")
canvas.width=video.videoWidth
canvas.height=video.videoHeight

const ctx=canvas.getContext("2d")

ctx.drawImage(video,0,0)

const img=ctx.getImageData(0,0,canvas.width,canvas.height)

let redCount=0
let blueCount=0

for(let i=0;i<img.data.length;i+=40){

let r=img.data[i]
let g=img.data[i+1]
let b=img.data[i+2]

if(r>200 && g<100 && b<100) redCount++
if(b>200 && r<100 && g<100) blueCount++

}

if(redCount>blueCount && redCount>500){

addResult("B")

}else if(blueCount>redCount && blueCount>500){

addResult("P")

}

}

function addResult(r){

if(results[results.length-1]===r) return

results.push(r)

update()

}

function buildBigRoad(data){

let road=[[]]

data.forEach(r=>{

let col=road[road.length-1]
let last=col[col.length-1]

if(last===r){

col.push(r)

}else{

road.push([r])

}

})

return road

}

function render(table,data){

table.innerHTML=""

for(let y=0;y<6;y++){

let tr=document.createElement("tr")

for(let x=0;x<data.length;x++){

let td=document.createElement("td")

if(data[x][y]){

if(data[x][y]==="B") td.className="red"
if(data[x][y]==="P") td.className="blue"

}

tr.appendChild(td)

}

table.appendChild(tr)

}

}

function update(){

let road=buildBigRoad(results)

render(document.getElementById("bigroad"),road)

}

</script>

</body>
</html>
