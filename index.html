<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ระบบสัญญาเงินกู้</title>

<script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>

<body>

<h2>แบบฟอร์มสัญญาเงินกู้</h2>

<form id="loanForm">

ชื่อผู้กู้
<input type="text" id="name" required>

เลขบัตรประชาชน
<input type="text" id="idcard">

ที่อยู่
<input type="text" id="address">

จำนวนเงินกู้
<input type="number" id="amount">

เบอร์โทร
<input type="text" id="phone">

อัปโหลดบัตรประชาชน
<input type="file" id="cardUpload">

<h3>ลายเซ็น</h3>

<canvas id="signature" width="300" height="150" style="border:1px solid black"></canvas>
<br>
<button type="button" onclick="clearSignature()">ล้างลายเซ็น</button>

<br><br>

<button type="submit">สร้างสัญญา</button>

</form>

<script src="script.js"></script>

</body>
</html>
