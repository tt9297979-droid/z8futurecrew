<!DOCTYPE html>
<html>

<head>

<title>AI Hedge Fund Terminal</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
background:#0a0f1c;
color:white;
font-family:Arial;
margin:0;
}

.sidebar{
width:220px;
height:100vh;
background:#020617;
position:fixed;
padding:20px;
}

.sidebar h2{
color:#38bdf8;
}

.sidebar button{
display:block;
width:100%;
margin:10px 0;
padding:10px;
background:#111827;
border:none;
color:white;
cursor:pointer;
}

.main{
margin-left:240px;
padding:20px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.card{
background:#020617;
padding:20px;
border-radius:10px;
}

.news{
padding:10px;
background:#1e293b;
margin:5px 0;
border-radius:6px;
}

input{
padding:10px;
border-radius:6px;
border:none;
width:200px;
}

button.analyze{
padding:10px 20px;
background:#3b82f6;
border:none;
color:white;
border-radius:6px;
}

</style>

</head>

<body>

<div class="sidebar">

<h2>🤖 AI TERMINAL</h2>

<button>Dashboard</button>
<button>Market Scanner</button>
<button>AI Signals</button>
<button>Liquidity Map</button>
<button>News</button>

</div>

<div class="main">

<h1>AI Hedge Fund Terminal</h1>

<input id="symbol" placeholder="Symbol (AAPL)">
<button class="analyze" onclick="analyze()">Analyze</button>

<div class="grid">

<div class="card">
<h3>Market Chart</h3>
<canvas id="chart"></canvas>
</div>

<div class="card">

<h3>AI Signals</h3>

<p id="trend">Trend:</p>
<p id="entry">Entry:</p>
<p id="tp">Take Profit:</p>
<p id="sl">Stop Loss:</p>

</div>

</div>

<div class="card">

<h3>Market News</h3>

<div id="news"></div>

</div>

</div>

<script>

let chart;

function analyze(){

let data=[];
let labels=[];

for(let i=0;i<50;i++){

let p=Math.random()*50+100;

data.push(p);
labels.push(i);

}

drawChart(labels,data);

ai(data);

news();

}

function drawChart(labels,data){

if(chart) chart.destroy();

let ctx=document.getElementById("chart");

chart=new Chart(ctx,{
type:"line",
data:{
labels:labels,
datasets:[{
label:"Price",
data:data
}]
}
})

}

function ai(data){

let last=data[data.length-1];
let prev=data[data.length-2];

let trend=last>prev?"BULLISH":"BEARISH";

let entry=(last*0.99).toFixed(2);
let tp=(last*1.05).toFixed(2);
let sl=(last*0.97).toFixed(2);

document.getElementById("trend").innerText="Trend: "+trend;
document.getElementById("entry").innerText="Entry: "+entry;
document.getElementById("tp").innerText="Take Profit: "+tp;
document.getElementById("sl").innerText="Stop Loss: "+sl;

}

function news(){

let newsData=[

"Federal Reserve signals rate changes",

"Tech stocks rally in early trading",

"Crypto market sees strong inflow"

]

let div=document.getElementById("news");

div.innerHTML="";

newsData.forEach(n=>{

let d=document.createElement("div");
d.className="news";
d.innerText=n;

div.appendChild(d);

})

}

</script>

</body>

</html>
