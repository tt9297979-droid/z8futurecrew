<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Gold AI Signal</title>

<script src="https://s3.tradingview.com/tv.js"></script>

<style>

body{
background:#0f172a;
color:white;
font-family:Arial;
text-align:center;
}

h1{
color:#facc15;
margin-top:20px;
}

.container{
max-width:900px;
margin:auto;
}

.signal{
background:#1e293b;
padding:20px;
border-radius:12px;
margin:20px;
font-size:20px;
}

.buy{
color:#22c55e;
}

.sell{
color:#ef4444;
}

#chart{
height:500px;
}

.box{
display:flex;
justify-content:space-around;
margin-top:10px;
}

.value{
font-size:18px;
}

</style>
</head>

<body>

<h1>GOLD AI SIGNAL</h1>

<div class="container">

<div class="signal">

<div id="signal">Loading...</div>

<div class="box">
<div class="value">Entry: <span id="entry"></span></div>
<div class="value">SL: <span id="sl"></span></div>
<div class="value">TP: <span id="tp"></span></div>
</div>

</div>

<div id="chart"></div>

</div>

<script>

// TradingView Chart
new TradingView.widget({
symbol: "OANDA:XAUUSD",
interval: "5",
container_id: "chart",
theme: "dark",
style: "1",
locale: "en",
toolbar_bg: "#0f172a",
enable_publishing: false,
hide_top_toolbar: false,
save_image: false,
});

// Fake market data simulation
function generateSignal(){

let price = 2000 + Math.random()*50;

let rsi = Math.random()*100;
let macd = Math.random()*2 -1;

let signal;
let entry;
let sl;
let tp;

if(rsi < 35 && macd > 0){

signal="BUY";
entry=price.toFixed(2);
sl=(price-10).toFixed(2);
tp=(price+20).toFixed(2);

}else{

signal="SELL";
entry=price.toFixed(2);
sl=(price+10).toFixed(2);
tp=(price-20).toFixed(2);

}

document.getElementById("signal").innerHTML=
signal=="BUY"
? "<span class='buy'>BUY SIGNAL</span>"
: "<span class='sell'>SELL SIGNAL</span>";

document.getElementById("entry").innerText=entry;
document.getElementById("sl").innerText=sl;
document.getElementById("tp").innerText=tp;

}

setInterval(generateSignal,4000);
generateSignal();

</script>

</body>
</html>
