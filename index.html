<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PromptPay QR Generator</title>

<script src="https://cdn.jsdelivr.net/npm/promptpay-qr"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>

body{
font-family:Arial;
background:#0b0f1a;
color:white;
text-align:center;
padding:40px
}

input{
padding:10px;
width:250px;
margin:6px;
border-radius:6px;
border:none
}

button{
padding:10px 20px;
background:#00c3ff;
border:none;
border-radius:8px;
cursor:pointer
}

#qrcode{
margin-top:30px
}

</style>
</head>

<body>

<h2>💰 PromptPay QR Generator</h2>

<input id="phone" placeholder="เบอร์ PromptPay เช่น 0812345678">
<br>

<input id="amount" placeholder="จำนวนเงิน (บาท)">
<br>

<button onclick="generateQR()">สร้าง QR</button>

<div id="qrcode"></div>

<script>

function generateQR(){

let phone=document.getElementById("phone").value
let amount=parseFloat(document.getElementById("amount").value)

let payload=PromptPayQR.generatePayload(phone,{amount:amount})

document.getElementById("qrcode").innerHTML=""

new QRCode(document.getElementById("qrcode"),{
text:payload,
width:220,
height:220
})

}

</script>

</body>
</html>
