<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Baccarat Roadmap Dashboard</title>

<style>

body{
background:#0b0f1a;
color:white;
font-family:Arial;
text-align:center
}

h1{
margin:20px
}

button{
padding:10px 20px;
margin:5px;
font-size:16px;
border:none;
border-radius:8px;
cursor:pointer
}

.banker{background:#ff4040;color:white}
.player{background:#2979ff;color:white}
.tie{background:#00c853;color:white}

.container{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:25px;
margin-top:20px
}

.panel{
background:#151b2e;
padding:15px;
border-radius:12px
}

table{
border-collapse:collapse
}

td{
width:20px;
height:20px;
border:1px solid #333
}

.red{background:#ff4040}
.blue{background:#2979ff}

.dashboard{
margin-top:20px;
font-size:18px
}

</style>
</head>

<body>

<h1>Baccarat Roadmap Dashboard</h1>

<button class="banker" onclick="addResult('B')">BANKER</button>
<button class="player" onclick="addResult('P')">PLAYER</button>
<button class="tie" onclick="addResult('T')">TIE</button>

<button onclick="resetGame()">RESET</button>

<div class="dashboard">

<div id="pattern"></div>
<div id="trend"></div>

</div>

<div class="container">

<div class="panel">
<h3>Big Road</h3>
<table id="bigroad"></table>
</div>

<div class="panel">
<h3>Big Eye Boy</h3>
<table id="bigeye"></table>
</div>

<div class="panel">
<h3>Small Road</h3>
<table id="smallroad"></table>
</div>

<div class="panel">
<h3>Cockroach Road</h3>
<table id="cockroach"></table>
</div>

</div>

<script>

let results=[]

function addResult(r){

results.push(r)
update()

}

function resetGame(){

results=[]
update()

}

function buildBigRoad(data){

let road=[[]]

data.forEach(r=>{

if(r==="T") return

let col=road[road.length-1]
let last=col[col.length-1]

if(last===r){

col.push(r)

}else{

road.push([r])

}

})

return road

}

function render(table,data){

table.innerHTML=""

for(let y=0;y<6;y++){

let tr=document.createElement("tr")

for(let x=0;x<data.length;x++){

let td=document.createElement("td")

if(data[x][y]){

let v=data[x][y]

if(v==="B") td.className="red"
if(v==="P") td.className="blue"
if(v==="R") td.className="red"
if(v==="L") td.className="blue"

}

tr.appendChild(td)

}

table.appendChild(tr)

}

}

function calcBigEye(road){

let res=[]

for(let i=2;i<road.length;i++){

if(road[i-1].length===road[i-2].length){

res.push(["R"])

}else{

res.push(["L"])

}

}

return res

}

function calcSmallRoad(road){

let res=[]

for(let i=3;i<road.length;i++){

if(road[i-1].length===road[i-3].length){

res.push(["R"])

}else{

res.push(["L"])

}

}

return res

}

function calcCockroach(road){

let res=[]

for(let i=4;i<road.length;i++){

if(road[i-1].length===road[i-4].length){

res.push(["R"])

}else{

res.push(["L"])

}

}

return res

}

function detectPattern(){

let last6=results.slice(-6).join("")

if(/BBBBBB/.test(last6) || /PPPPPP/.test(last6))
return "Dragon"

if(/BPBPBP/.test(last6) || /PBPBPB/.test(last6))
return "Ping Pong"

return "Normal"

}

function detectTrend(){

let last10=results.slice(-10)

let b=last10.filter(x=>x==="B").length
let p=last10.filter(x=>x==="P").length

if(b>p) return "Banker Trend"
if(p>b) return "Player Trend"

return "Neutral"

}

function update(){

let road=buildBigRoad(results)

render(document.getElementById("bigroad"),road)

let bigeye=calcBigEye(road)
let small=calcSmallRoad(road)
let cock=calcCockroach(road)

render(document.getElementById("bigeye"),bigeye)
render(document.getElementById("smallroad"),small)
render(document.getElementById("cockroach"),cock)

document.getElementById("pattern").innerText=
"Pattern: "+detectPattern()

document.getElementById("trend").innerText=
"Trend: "+detectTrend()

}

update()

</script>

</body>
</html>
