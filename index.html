<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Baccarat Evolution Style</title>

<style>

body{
background:#0d0f14;
color:white;
font-family:Arial;
margin:0;
}

.header{
background:#151821;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.title{
font-size:22px;
color:#ffd700;
}

.controls button{
margin:5px;
padding:8px 15px;
border:none;
border-radius:6px;
font-weight:bold;
cursor:pointer;
}

.banker{background:#d32f2f;color:white}
.player{background:#1976d2;color:white}
.tie{background:#2e7d32;color:white}

.dashboard{
display:flex;
gap:20px;
padding:15px;
background:#11141b;
}

.card{
background:#1b1f2b;
padding:10px 15px;
border-radius:8px;
}

.roadmap{
padding:20px;
display:flex;
gap:20px;
flex-wrap:wrap;
justify-content:center;
}

.panel{
background:white;
padding:10px;
border-radius:6px;
}

.panel h3{
color:black;
text-align:center;
margin:5px;
}

table{
border-collapse:collapse;
}

td{
width:24px;
height:24px;
border:1px solid #ddd;
text-align:center;
vertical-align:middle;
}

.circle{
width:18px;
height:18px;
border-radius:50%;
margin:auto;
}

.red{background:#d32f2f}
.blue{background:#1976d2}

canvas{
background:#0f1219;
margin:20px;
border-radius:10px;
}

</style>
</head>

<body>

<div class="header">

<div class="title">Baccarat Analyzer</div>

<div class="controls">

<button class="banker" onclick="addResult('B')">Banker</button>
<button class="player" onclick="addResult('P')">Player</button>
<button class="tie" onclick="addResult('T')">Tie</button>

<button onclick="resetGame()">Reset</button>

</div>

</div>

<div class="dashboard">

<div class="card" id="pattern"></div>
<div class="card" id="trend"></div>
<div class="card" id="percent"></div>

</div>

<div class="roadmap">

<div class="panel">
<h3>Big Road</h3>
<table id="bigroad"></table>
</div>

<div class="panel">
<h3>Big Eye</h3>
<table id="bigeye"></table>
</div>

<div class="panel">
<h3>Small Road</h3>
<table id="smallroad"></table>
</div>

<div class="panel">
<h3>Cockroach</h3>
<table id="cockroach"></table>
</div>

</div>

<center>

<canvas id="trendGraph" width="700" height="200"></canvas>

</center>

<script>

let results=[]

function addResult(r){
results.push(r)
update()
}

function resetGame(){
results=[]
update()
}

function buildBigRoad(data){

let road=[[]]

data.forEach(r=>{

if(r==="T") return

let col=road[road.length-1]
let last=col[col.length-1]

if(last===r){

col.push(r)

}else{

road.push([r])

}

})

return road
}

function render(table,data){

table.innerHTML=""

for(let y=0;y<6;y++){

let tr=document.createElement("tr")

for(let x=0;x<data.length;x++){

let td=document.createElement("td")

if(data[x][y]){

let div=document.createElement("div")
div.className="circle"

if(data[x][y]==="B") div.classList.add("red")
if(data[x][y]==="P") div.classList.add("blue")

td.appendChild(div)

}

tr.appendChild(td)

}

table.appendChild(tr)

}

}

function calcRoad(road,skip){

let res=[]

for(let i=skip;i<road.length;i++){

if(road[i-1].length===road[i-skip].length){
res.push(["B"])
}else{
res.push(["P"])
}

}

return res
}

function detectPattern(){

let last=results.slice(-6).join("")

if(/BBBBBB/.test(last)||/PPPPPP/.test(last))
return "Pattern: Dragon"

if(/BPBPBP/.test(last)||/PBPBPB/.test(last))
return "Pattern: Ping Pong"

return "Pattern: Normal"

}

function detectTrend(){

let last=results.slice(-10)

let b=last.filter(x=>x==="B").length
let p=last.filter(x=>x==="P").length

if(b>p) return "Trend: Banker"
if(p>b) return "Trend: Player"

return "Trend: Neutral"

}

function calcPercent(){

let b=results.filter(x=>x==="B").length
let p=results.filter(x=>x==="P").length
let t=results.filter(x=>x==="T").length

let total=results.length||1

return `Banker ${Math.round(b/total*100)}% | Player ${Math.round(p/total*100)}% | Tie ${Math.round(t/total*100)}%`
}

function drawGraph(){

let canvas=document.getElementById("trendGraph")
let ctx=canvas.getContext("2d")

ctx.clearRect(0,0,canvas.width,canvas.height)

let score=0
let x=0

ctx.beginPath()

results.forEach((r,i)=>{

if(r==="B") score++
if(r==="P") score--

let y=100-score*5

if(i===0) ctx.moveTo(x,y)
else ctx.lineTo(x,y)

x+=15

})

ctx.strokeStyle="#00e5ff"
ctx.stroke()

}

function update(){

let road=buildBigRoad(results)

render(document.getElementById("bigroad"),road)

let bigeye=calcRoad(road,2)
let small=calcRoad(road,3)
let cock=calcRoad(road,4)

render(document.getElementById("bigeye"),bigeye)
render(document.getElementById("smallroad"),small)
render(document.getElementById("cockroach"),cock)

document.getElementById("pattern").innerText=detectPattern()
document.getElementById("trend").innerText=detectTrend()
document.getElementById("percent").innerText=calcPercent()

drawGraph()

}

update()

</script>

</body>
</html>
