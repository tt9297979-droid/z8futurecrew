<!DOCTYPE html>
<html>
<head>

<title>AI Face + Pose Detection</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/posenet"></script>
<script defer src="https://cdn.jsdelivr.net/npm/face-api.js"></script>

<style>

body{
background:#0f172a;
color:white;
text-align:center;
font-family:sans-serif;
}

video{
border:3px solid cyan;
border-radius:10px;
}

canvas{
position:absolute;
left:0;
top:0;
}

</style>

</head>

<body>

<h1>🤖 AI Face + Pose Detector</h1>

<div style="position:relative;display:inline-block">

<video id="video" width="640" height="480" autoplay></video>

<canvas id="canvas" width="640" height="480"></canvas>

</div>

<script>

const video = document.getElementById("video")
const canvas = document.getElementById("canvas")
const ctx = canvas.getContext("2d")

async function startCamera(){

const stream = await navigator.mediaDevices.getUserMedia({
video:true
})

video.srcObject = stream

}

async function loadAI(){

const poseNet = await posenet.load()

await faceapi.nets.tinyFaceDetector.loadFromUri(
'https://justadudewhohacks.github.io/face-api.js/models'
)

detectAI(poseNet)

}

async function detectAI(poseNet){

setInterval(async()=>{

ctx.clearRect(0,0,640,480)

const faces = await faceapi.detectAllFaces(
video,
new faceapi.TinyFaceDetectorOptions()
)

faces.forEach(face=>{

const box = face.box

ctx.strokeStyle="lime"
ctx.lineWidth=2

ctx.strokeRect(
box.x,
box.y,
box.width,
box.height
)

ctx.fillText("FACE",box.x,box.y-5)

})

const pose = await poseNet.estimateSinglePose(video)

pose.keypoints.forEach(k=>{

if(k.score > 0.5){

ctx.beginPath()

ctx.arc(
k.position.x,
k.position.y,
5,
0,
2*Math.PI
)

ctx.fillStyle="red"
ctx.fill()

}

})

},100)

}

startCamera().then(loadAI)

</script>

</body>
</html>
