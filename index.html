<!DOCTYPE html>
<html>
<head>

<title>GOLD AI TERMINAL</title>

<style>

body{
background:#0b0b0b;
color:white;
font-family:Arial;
text-align:center;
}

.box{
background:#1a1a1a;
padding:20px;
margin:20px;
border-radius:12px;
}

h1{
color:gold;
}

button{
padding:10px 20px;
background:gold;
border:none;
border-radius:8px;
font-size:16px;
}

</style>

</head>

<body>

<h1>GOLD AI HEDGE FUND</h1>

<div class="box">

<h2 id="trend">Trend : -</h2>
<h2 id="signal">Signal : -</h2>
<h2 id="entry">Entry : -</h2>

</div>

<div class="box">

<h3 id="tp1">TP1 : -</h3>
<h3 id="tp2">TP2 : -</h3>
<h3 id="tp3">TP3 : -</h3>

</div>

<button onclick="analyze()">Analyze Market</button>

<div class="box">

<iframe
src="https://www.tradingview.com/widgetembed/?symbol=OANDA:XAUUSD&interval=5"
width="100%"
height="500">
</iframe>

</div>

<script>

function analyze(){

let price = 2000 + Math.random()*20

let trend = Math.random() > 0.5 ? "BULLISH":"BEARISH"

let signal = trend == "BULLISH" ? "BUY":"SELL"

let entry = trend == "BULLISH" ? price-5 : price+5

let tp1 = trend == "BULLISH" ? price+10 : price-10
let tp2 = trend == "BULLISH" ? price+20 : price-20
let tp3 = trend == "BULLISH" ? price+30 : price-30

document.getElementById("trend").innerText = "Trend : "+trend
document.getElementById("signal").innerText = "Signal : "+signal
document.getElementById("entry").innerText = "Entry : "+entry.toFixed(2)

document.getElementById("tp1").innerText = "TP1 : "+tp1.toFixed(2)
document.getElementById("tp2").innerText = "TP2 : "+tp2.toFixed(2)
document.getElementById("tp3").innerText = "TP3 : "+tp3.toFixed(2)

}

</script>

</body>
</html>
